name: Release

# Tag a version to publish: `git tag v1.4.0 && git push origin v1.4.0`
on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm Trusted Publishing (OIDC) — no token — + automatic provenance

jobs:
  release:
    name: publish npm + deploy aeicon5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # NOTE: no `registry-url` — it makes setup-node write an `.npmrc` with an
      # empty `_authToken`, which npm then uses (and the registry rejects:
      # "authentication token seems to be invalid"), preempting OIDC. Trusted
      # Publishing uses the default npmjs registry + the OIDC identity instead.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Trusted Publishing (OIDC) requires npm >= 11.5.1; Node 22 ships npm 10.
      - name: Upgrade npm (for OIDC publishing)
        run: npm install -g npm@latest

      - run: npm ci

      - name: Build (dist + dist-custom-elements + www)
        run: npm run build

      - name: Validate scoped-icon manifest
        run: npm run check.icons

      - name: Validate third-party guide pins (sync guard)
        run: npm run check.guide

      - name: Test (spec + unit)
        run: |
          npm test
          npm run test.unit

      # Trusted Publishing: GitHub authenticates to npm via OIDC (no NPM_TOKEN).
      # Provenance is generated automatically; requires the npm "trusted publisher"
      # for this repo + workflow to be configured (see README release runbook).
      - name: Publish to npm (Trusted Publishing / OIDC)
        run: |
          node --version
          npm --version   # must be >= 11.5.1 for OIDC trusted publishing
          # OIDC diagnostics: is GitHub actually issuing an id-token to this job?
          # Prints "yes" if the request URL is present (never prints the token itself).
          echo "OIDC id-token request URL present: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"
          # --loglevel=verbose surfaces the OIDC token-exchange request + the
          # registry's rejection reason (e.g. trusted-publisher field mismatch).
          npm publish --access public --loglevel=verbose

      - name: Deploy demo to Firebase (aeicon5)
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          npx firebase-tools deploy --only hosting --project aeicon5 --non-interactive
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Smoke the deployed demo
        run: npm run smoke
        env:
          CI: 'true'
          BASE_URL: https://aeicon5.web.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
