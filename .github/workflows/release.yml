name: Release

# Tag a version to publish: `git tag v1.4.0 && git push origin v1.4.0`
on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub Release
  id-token: write # npm Trusted Publishing (OIDC) — no token — + automatic provenance

jobs:
  release:
    name: publish npm + deploy aeicon5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (OIDC) requires npm >= 11.5.1; Node 22 ships npm 10.
      - name: Upgrade npm (for OIDC publishing)
        run: npm install -g npm@latest

      - run: npm ci

      - name: Build (dist + dist-custom-elements + www)
        run: npm run build

      - name: Validate scoped-icon manifest
        run: npm run check.icons

      - name: Validate third-party guide pins (sync guard)
        run: npm run check.guide

      - name: Test (spec + unit)
        run: |
          npm test
          npm run test.unit

      # Trusted Publishing: GitHub authenticates to npm via OIDC (no NPM_TOKEN).
      # Provenance is generated automatically; requires the npm "trusted publisher"
      # for this repo + workflow to be configured (see README release runbook).
      - name: Publish to npm (Trusted Publishing / OIDC)
        run: npm publish --access public

      - name: Deploy demo to Firebase (aeicon5)
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          npx firebase-tools deploy --only hosting --project aeicon5 --non-interactive
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Smoke the deployed demo
        run: npm run smoke
        env:
          CI: 'true'
          BASE_URL: https://aeicon5.web.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
